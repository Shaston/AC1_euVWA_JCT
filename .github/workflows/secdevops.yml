name: SecDevOps Pipeline

on:
  push:
    branches:
      - main-vulnerable
      - main-secure
  pull_request:
    branches:
      - main-vulnerable
      - main-secure
  workflow_dispatch:

jobs:
  baseline:
    name: Baseline build and validation
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Semgrep
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install semgrep

      - name: Run SAST with Semgrep
        run: |
          mkdir -p reports
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/javascript \
            --json \
            --output reports/semgrep-report.json \
            .

          semgrep scan \
            --config p/owasp-top-ten \
            --config p/javascript \
            --text \
            --output reports/semgrep-report.txt \
            .

      - name: Generate Semgrep summary
        if: always()
        run: |
          node - <<'EOF'
          const fs = require("fs");
          const path = "reports/semgrep-report.json";

          let count = 0;
          let findings = [];

          if (fs.existsSync(path)) {
            const data = JSON.parse(fs.readFileSync(path, "utf8"));
            findings = data.results || [];
            count = findings.length;
          }

          const bySeverity = {};
          for (const finding of findings) {
            const severity = finding.extra?.severity || "UNKNOWN";
            bySeverity[severity] = (bySeverity[severity] || 0) + 1;
          }

          let md = "# Semgrep SAST report\n\n";
          md += `- Total findings: ${count}\n`;
          md += `- Branch: ${process.env.GITHUB_REF_NAME}\n`;
          md += `- Commit: ${process.env.GITHUB_SHA}\n\n`;
          md += "## Findings by severity\n\n";

          for (const [severity, total] of Object.entries(bySeverity)) {
            md += `- ${severity}: ${total}\n`;
          }

          if (findings.length > 0) {
            md += "\n## First findings\n\n";
            for (const finding of findings.slice(0, 10)) {
              md += `- **${finding.check_id}** in \`${finding.path}\` line ${finding.start?.line || "?"}\n`;
              md += `  - ${finding.extra?.message || "No message"}\n`;
            }
          }

          fs.writeFileSync("reports/semgrep-summary.md", md);
          EOF

      - name: Run dependency and filesystem scan with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'reports/trivy-fs-report.json'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'

      - name: Generate SBOM with Trivy CycloneDX
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'reports/sbom-cyclonedx.json'
          exit-code: '0'

      - name: Scan generated SBOM with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'sbom'
          scan-ref: 'reports/sbom-cyclonedx.json'
          format: 'json'
          output: 'reports/trivy-sbom-report.json'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'

      - name: Show project metadata
        run: |
          mkdir -p reports
          echo "# SecDevOps baseline report" > reports/baseline-report.md
          echo "" >> reports/baseline-report.md
          echo "- Branch: $GITHUB_REF_NAME" >> reports/baseline-report.md
          echo "- Commit: $GITHUB_SHA" >> reports/baseline-report.md
          echo "- Node version: $(node -v)" >> reports/baseline-report.md
          echo "- npm version: $(npm -v)" >> reports/baseline-report.md
          echo "- Date: $(date -u)" >> reports/baseline-report.md

      - name: Validate application startup
        run: |
          timeout 10s npm start || code=$?
          if [ "${code:-0}" = "124" ]; then
            echo "Application started successfully and was stopped after timeout."
            exit 0
          fi
          exit ${code:-0}

      - name: Build Docker image
        run: |
          docker build -t euvwa:${{ github.ref_name }} .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'image'
          image-ref: 'euvwa:${{ github.ref_name }}'
          format: 'json'
          output: 'reports/trivy-image-report.json'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'

      - name: Generate Trivy summary
        if: always()
        run: |
          node - <<'EOF'
          const fs = require("fs");

          function countVulnerabilities(file) {
            if (!fs.existsSync(file)) {
              return { total: 0, bySeverity: {} };
            }

            const data = JSON.parse(fs.readFileSync(file, "utf8"));
            const results = data.Results || [];
            const bySeverity = {};
            let total = 0;

            for (const result of results) {
              const vulns = result.Vulnerabilities || [];
              for (const vuln of vulns) {
                total++;
                const sev = vuln.Severity || "UNKNOWN";
                bySeverity[sev] = (bySeverity[sev] || 0) + 1;
              }
            }

            return { total, bySeverity };
          }

          const scans = [
            ["Filesystem / dependencies", "reports/trivy-fs-report.json"],
            ["SBOM", "reports/trivy-sbom-report.json"],
            ["Docker image", "reports/trivy-image-report.json"]
          ];

          let md = "# Trivy security report\n\n";
          md += `- Branch: ${process.env.GITHUB_REF_NAME}\n`;
          md += `- Commit: ${process.env.GITHUB_SHA}\n\n`;

          for (const [name, file] of scans) {
            const result = countVulnerabilities(file);
            md += `## ${name}\n\n`;
            md += `- Total vulnerabilities: ${result.total}\n`;

            if (Object.keys(result.bySeverity).length === 0) {
              md += "- No vulnerabilities reported in this scan output.\n\n";
              continue;
            }

            md += "\n### By severity\n\n";
            for (const severity of ["CRITICAL", "HIGH", "MEDIUM", "LOW", "UNKNOWN"]) {
              if (result.bySeverity[severity]) {
                md += `- ${severity}: ${result.bySeverity[severity]}\n`;
              }
            }
            md += "\n";
          }

          fs.writeFileSync("reports/trivy-summary.md", md);
          EOF

      - name: Upload pipeline reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secdevops-reports-${{ github.ref_name }}
          path: reports/
