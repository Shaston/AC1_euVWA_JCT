name: SecDevOps Pipeline

on:
  push:
    branches:
      - main-vulnerable
      - main-secure
  pull_request:
    branches:
      - main-vulnerable
      - main-secure
  workflow_dispatch:

jobs:
  baseline:
    name: Baseline build and validation
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Semgrep
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install semgrep

      - name: Run SAST with Semgrep
        run: |
          mkdir -p reports
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/javascript \
            --json \
            --output reports/semgrep-report.json \
            .

          semgrep scan \
            --config p/owasp-top-ten \
            --config p/javascript \
            --text \
            --output reports/semgrep-report.txt \
            .

      - name: Generate Semgrep summary
        if: always()
        run: |
          node - <<'EOF'
          const fs = require("fs");
          const path = "reports/semgrep-report.json";

          let count = 0;
          let findings = [];

          if (fs.existsSync(path)) {
            const data = JSON.parse(fs.readFileSync(path, "utf8"));
            findings = data.results || [];
            count = findings.length;
          }

          const bySeverity = {};
          for (const finding of findings) {
            const severity = finding.extra?.severity || "UNKNOWN";
            bySeverity[severity] = (bySeverity[severity] || 0) + 1;
          }

          let md = "# Semgrep SAST report\n\n";
          md += `- Total findings: ${count}\n`;
          md += `- Branch: ${process.env.GITHUB_REF_NAME}\n`;
          md += `- Commit: ${process.env.GITHUB_SHA}\n\n`;
          md += "## Findings by severity\n\n";

          for (const [severity, total] of Object.entries(bySeverity)) {
            md += `- ${severity}: ${total}\n`;
          }

          if (findings.length > 0) {
            md += "\n## First findings\n\n";
            for (const finding of findings.slice(0, 10)) {
              md += `- **${finding.check_id}** in \`${finding.path}\` line ${finding.start?.line || "?"}\n`;
              md += `  - ${finding.extra?.message || "No message"}\n`;
            }
          }

          fs.writeFileSync("reports/semgrep-summary.md", md);
          EOF

      - name: Run dependency and filesystem scan with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'reports/trivy-fs-report.json'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'

      - name: Generate SBOM with Trivy CycloneDX
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'reports/sbom-cyclonedx.json'
          exit-code: '0'

      - name: Scan generated SBOM with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'sbom'
          scan-ref: 'reports/sbom-cyclonedx.json'
          format: 'json'
          output: 'reports/trivy-sbom-report.json'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'

      - name: Show project metadata
        run: |
          mkdir -p reports
          echo "# SecDevOps baseline report" > reports/baseline-report.md
          echo "" >> reports/baseline-report.md
          echo "- Branch: $GITHUB_REF_NAME" >> reports/baseline-report.md
          echo "- Commit: $GITHUB_SHA" >> reports/baseline-report.md
          echo "- Node version: $(node -v)" >> reports/baseline-report.md
          echo "- npm version: $(npm -v)" >> reports/baseline-report.md
          echo "- Date: $(date -u)" >> reports/baseline-report.md

      - name: Validate application startup
        run: |
          timeout 10s npm start || code=$?
          if [ "${code:-0}" = "124" ]; then
            echo "Application started successfully and was stopped after timeout."
            exit 0
          fi
          exit ${code:-0}

      - name: Build Docker image
        run: |
          docker build -t euvwa:${{ github.ref_name }} .

      - name: Start application for DAST
        run: |
          docker network create secdevops-net || true

          docker run -d \
            --name euvwa-dast \
            --network secdevops-net \
            -p 3000:3000 \
            -e PORT=3000 \
            euvwa:${{ github.ref_name }}

          echo "Waiting for application to be ready..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:3000 > /dev/null; then
              echo "Application is ready."
              exit 0
            fi
            sleep 2
          done

          echo "Application did not start in time."
          docker logs euvwa-dast || true
          exit 1

      - name: Run DAST with OWASP ZAP Baseline
        run: |
          mkdir -p reports/zap
          chmod 777 reports/zap

          docker run --rm \
            --network secdevops-net \
            -v ${{ github.workspace }}/reports/zap:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://euvwa-dast:3000 \
            -J zap-report.json \
            -r zap-report.html \
            -w zap-report.md \
            -I || true

          echo "ZAP output files:"
          ls -la reports/zap || true

      - name: Generate ZAP summary
        if: always()
        run: |
          node - <<'EOF'
          const fs = require("fs");

          const zapJson = "reports/zap/zap-report.json";
          const target = "http://euvwa-dast:3000";

          function stripHtml(value) {
            return String(value || "")
              .replace(/<[^>]*>/g, " ")
              .replace(/\s+/g, " ")
              .trim();
          }

          function cleanCell(value, max = 120) {
            const text = stripHtml(value)
              .replace(/\|/g, "/")
              .replace(/\r?\n|\r/g, " ")
              .trim();

            if (!text) return "-";
            return text.length > max ? text.slice(0, max - 3) + "..." : text;
          }

          function relativeUrl(value) {
            if (!value) return "-";
            return String(value).replace(target, "") || "/";
          }

          function normalizeRisk(riskdesc) {
            const raw = String(riskdesc || "UNKNOWN");
            const risk = raw.split(" ")[0];
            return risk || "UNKNOWN";
          }

          function extractConfidence(riskdesc, confidence) {
            const raw = String(riskdesc || "");
            const match = raw.match(/\(([^)]+)\)/);
            if (match) return match[1];

            const map = {
              "0": "False Positive",
              "1": "Low",
              "2": "Medium",
              "3": "High",
              "4": "Confirmed"
            };

            return map[String(confidence || "")] || String(confidence || "UNKNOWN");
          }

          function riskWeight(risk) {
            const order = {
              High: 1,
              Medium: 2,
              Low: 3,
              Informational: 4,
              UNKNOWN: 5
            };
            return order[risk] || 99;
          }

          let md = "# OWASP ZAP DAST report\n\n";
          md += `- Branch: ${process.env.GITHUB_REF_NAME}\n`;
          md += `- Commit: ${process.env.GITHUB_SHA}\n`;
          md += `- Target: ${target}\n\n`;

          if (!fs.existsSync(zapJson)) {
            md += "ZAP report was not generated.\n";
            fs.writeFileSync("reports/zap-summary.md", md);
            process.exit(0);
          }

          const data = JSON.parse(fs.readFileSync(zapJson, "utf8"));
          const sites = data.site || [];

          const alerts = [];

          for (const site of sites) {
            for (const alert of site.alerts || []) {
              const instances = alert.instances || [];
              const first = instances[0] || {};

              const risk = normalizeRisk(alert.riskdesc);
              const confidence = extractConfidence(alert.riskdesc, alert.confidence);
              const count = Number(alert.count || instances.length || 1);

              alerts.push({
                risk,
                confidence,
                name: alert.alert || alert.name || "Unknown alert",
                count,
                url: first.uri || "",
                method: first.method || "",
                param: first.param || "",
                evidence: first.evidence || first.otherinfo || "",
                cweid: alert.cweid || "",
                wascid: alert.wascid || "",
                solution: alert.solution || "",
                desc: alert.desc || ""
              });
            }
          }

          alerts.sort((a, b) => {
            const byRisk = riskWeight(a.risk) - riskWeight(b.risk);
            if (byRisk !== 0) return byRisk;
            return a.name.localeCompare(b.name);
          });

          const summary = {};

          for (const alert of alerts) {
            if (!summary[alert.risk]) {
              summary[alert.risk] = { alertTypes: 0, occurrences: 0 };
            }

            summary[alert.risk].alertTypes += 1;
            summary[alert.risk].occurrences += alert.count;
          }

          md += "## Resumen por riesgo\n\n";
          md += "| Riesgo | Tipos de alerta | Ocurrencias |\n";
          md += "|---|---:|---:|\n";

          for (const risk of ["High", "Medium", "Low", "Informational", "UNKNOWN"]) {
            if (summary[risk]) {
              md += `| ${risk} | ${summary[risk].alertTypes} | ${summary[risk].occurrences} |\n`;
            }
          }

          md += "\n## Alertas detectadas agrupadas\n\n";
          md += "| Riesgo | Confianza | Alerta | Ocurrencias | URL ejemplo | Método | Parámetro/Cabecera | Evidencia | CWE/WASC |\n";
          md += "|---|---|---|---:|---|---|---|---|---|\n";

          if (alerts.length === 0) {
            md += "| - | - | Sin alertas | 0 | - | - | - | - | - |\n";
          } else {
            for (const alert of alerts) {
              const cwe = alert.cweid ? `CWE-${alert.cweid}` : "-";
              const wasc = alert.wascid ? `WASC-${alert.wascid}` : "-";

              md += `| ${cleanCell(alert.risk)} `;
              md += `| ${cleanCell(alert.confidence)} `;
              md += `| ${cleanCell(alert.name)} `;
              md += `| ${alert.count} `;
              md += `| ${cleanCell(relativeUrl(alert.url), 90)} `;
              md += `| ${cleanCell(alert.method, 20)} `;
              md += `| ${cleanCell(alert.param, 60)} `;
              md += `| ${cleanCell(alert.evidence, 90)} `;
              md += `| ${cwe} / ${wasc} |\n`;
            }
          }

          md += "\n## Detalle técnico resumido\n\n";

          if (alerts.length === 0) {
            md += "No se han detectado alertas en el informe JSON de ZAP.\n";
          } else {
            for (const alert of alerts) {
              md += `### ${alert.risk} - ${cleanCell(alert.name, 120)}\n\n`;
              md += `- **Confianza:** ${cleanCell(alert.confidence)}\n`;
              md += `- **Ocurrencias:** ${alert.count}\n`;
              md += `- **URL ejemplo:** ${cleanCell(relativeUrl(alert.url), 160)}\n`;
              md += `- **Parámetro/Cabecera:** ${cleanCell(alert.param, 120)}\n`;
              md += `- **Evidencia:** ${cleanCell(alert.evidence, 160)}\n`;
              md += `- **CWE/WASC:** ${alert.cweid ? "CWE-" + alert.cweid : "-"} / ${alert.wascid ? "WASC-" + alert.wascid : "-"}\n`;
              md += `- **Descripción:** ${cleanCell(alert.desc, 260)}\n`;
              md += `- **Recomendación:** ${cleanCell(alert.solution, 260)}\n\n`;
            }
          }

          fs.writeFileSync("reports/zap-summary.md", md);
          EOF

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'image'
          image-ref: 'euvwa:${{ github.ref_name }}'
          format: 'json'
          output: 'reports/trivy-image-report.json'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'

      - name: Generate Trivy summary
        if: always()
        run: |
          node - <<'EOF'
          const fs = require("fs");

          function countVulnerabilities(file) {
            if (!fs.existsSync(file)) {
              return { total: 0, bySeverity: {} };
            }

            const data = JSON.parse(fs.readFileSync(file, "utf8"));
            const results = data.Results || [];
            const bySeverity = {};
            let total = 0;

            for (const result of results) {
              const vulns = result.Vulnerabilities || [];
              for (const vuln of vulns) {
                total++;
                const sev = vuln.Severity || "UNKNOWN";
                bySeverity[sev] = (bySeverity[sev] || 0) + 1;
              }
            }

            return { total, bySeverity };
          }

          const scans = [
            ["Filesystem / dependencies", "reports/trivy-fs-report.json"],
            ["SBOM", "reports/trivy-sbom-report.json"],
            ["Docker image", "reports/trivy-image-report.json"]
          ];

          let md = "# Trivy security report\n\n";
          md += `- Branch: ${process.env.GITHUB_REF_NAME}\n`;
          md += `- Commit: ${process.env.GITHUB_SHA}\n\n`;

          for (const [name, file] of scans) {
            const result = countVulnerabilities(file);
            md += `## ${name}\n\n`;
            md += `- Total vulnerabilities: ${result.total}\n`;

            if (Object.keys(result.bySeverity).length === 0) {
              md += "- No vulnerabilities reported in this scan output.\n\n";
              continue;
            }

            md += "\n### By severity\n\n";
            for (const severity of ["CRITICAL", "HIGH", "MEDIUM", "LOW", "UNKNOWN"]) {
              if (result.bySeverity[severity]) {
                md += `- ${severity}: ${result.bySeverity[severity]}\n`;
              }
            }
            md += "\n";
          }

          fs.writeFileSync("reports/trivy-summary.md", md);
          EOF

      - name: Stop DAST application container
        if: always()
        run: |
          docker logs euvwa-dast || true
          docker stop euvwa-dast || true
          docker rm euvwa-dast || true
          docker network rm secdevops-net || true

      - name: Evaluate security gate
        if: always()
        run: |
          node - <<'EOF'
          const fs = require("fs");

          const zapJson = "reports/zap/zap-report.json";
          const gateReport = "reports/security-gate-report.md";

          let highTypes = 0;
          let highOccurrences = 0;
          let highAlerts = [];
          let gateFailed = false;
          let reason = "";

          function normalizeRisk(riskdesc) {
            const raw = String(riskdesc || "UNKNOWN");
            return raw.split(" ")[0] || "UNKNOWN";
          }

          function clean(value, max = 180) {
            const text = String(value || "")
              .replace(/<[^>]*>/g, " ")
              .replace(/\|/g, "/")
              .replace(/\s+/g, " ")
              .trim();

            if (!text) return "-";
            return text.length > max ? text.slice(0, max - 3) + "..." : text;
          }

          if (!fs.existsSync(zapJson)) {
            gateFailed = true;
            reason = "ZAP report was not generated. DAST evidence is missing.";
          } else {
            const data = JSON.parse(fs.readFileSync(zapJson, "utf8"));

            for (const site of data.site || []) {
              for (const alert of site.alerts || []) {
                const risk = normalizeRisk(alert.riskdesc);

                if (risk === "High") {
                  const instances = alert.instances || [];
                  const count = Number(alert.count || instances.length || 1);
                  const first = instances[0] || {};

                  highTypes += 1;
                  highOccurrences += count;

                  highAlerts.push({
                    name: alert.alert || alert.name || "Unknown alert",
                    count,
                    url: first.uri || "-",
                    method: first.method || "-",
                    param: first.param || "-",
                    evidence: first.evidence || first.otherinfo || "-",
                    cweid: alert.cweid || "-",
                    wascid: alert.wascid || "-"
                  });
                }
              }
            }

            if (highOccurrences > 0) {
              gateFailed = true;
              reason = `DAST detected ${highOccurrences} High risk occurrence(s) in ${highTypes} alert type(s).`;
            } else {
              reason = "No High risk DAST alerts detected.";
            }
          }

          let md = "# Security Gate Report\n\n";
          md += `- Branch: ${process.env.GITHUB_REF_NAME}\n`;
          md += `- Commit: ${process.env.GITHUB_SHA}\n`;
          md += `- Gate criterion: fail if OWASP ZAP reports any High risk alert\n`;
          md += `- Gate status: ${gateFailed ? "FAILED" : "PASSED"}\n`;
          md += `- Reason: ${reason}\n\n`;

          md += "## High risk alerts\n\n";

          if (highAlerts.length === 0) {
            md += "No High risk alerts were detected.\n";
          } else {
            md += "| Alert | Ocurrencias | URL ejemplo | Método | Parámetro/Cabecera | Evidencia | CWE/WASC |\n";
            md += "|---|---:|---|---|---|---|---|\n";

            for (const alert of highAlerts) {
              md += `| ${clean(alert.name)} `;
              md += `| ${alert.count} `;
              md += `| ${clean(alert.url)} `;
              md += `| ${clean(alert.method, 30)} `;
              md += `| ${clean(alert.param, 80)} `;
              md += `| ${clean(alert.evidence, 120)} `;
              md += `| ${alert.cweid !== "-" ? "CWE-" + alert.cweid : "-"} / ${alert.wascid !== "-" ? "WASC-" + alert.wascid : "-"} |\n`;
            }
          }

          fs.writeFileSync(gateReport, md);

          fs.appendFileSync(process.env.GITHUB_ENV, `SECURITY_GATE_FAILED=${gateFailed ? "true" : "false"}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `SECURITY_GATE_REASON=${reason.replace(/\n/g, " ")}\n`);
          EOF

      - name: Upload pipeline reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secdevops-reports-${{ github.ref_name }}
          path: reports/

      - name: Enforce security gate
        if: always()
        run: |
          echo "Security gate result: $SECURITY_GATE_FAILED"
          echo "Reason: $SECURITY_GATE_REASON"

          if [ "$SECURITY_GATE_FAILED" = "true" ]; then
            echo "Security gate failed."
            cat reports/security-gate-report.md || true
            exit 1
          fi

          echo "Security gate passed."
